    <main>
      <p>Пожалуйста, уделите немного времени, чтобы заполнить наш опрос ниже.</p>

      <form action="#" method="post">
        <p>Часто ли вы посещаете этот сайт?</p>
        <label><input type="radio" name="visit" value="yes"> Да</label><br>
        <label><input type="radio" name="visit" value="no"> Нет</label><br><br>

        <input type="number" id="age" name="age" min="0"><br><br>

        <label for="notes">Любые заметки:</label><br>
        <textarea id="notes" name="notes" rows="3" cols="40"></textarea><br><br>

        <input type="submit" value="Send Survey">
