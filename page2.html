<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Третья - отзывы</title>
  </head>
  <body>
    <header>
      <h1>Третья страница — Отзывы</h1>
      <nav>
        <ul>
          <li><a href="index.html">первая</a></li>
          <li><a href="page1.html">вторая</a></li>
          <li><a href="page2.html">третья</a></li>
          <li><a href="page3.html">четвертая</a></li>
          <li><a href="page4.html">пятая</a></li>
          <li><a href="page5.html">шестая</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <p>Мы ценим ваш отзыв. Пожалуйста, заполните короткую форму ниже.</p>

      <form action="#" method="post">
        <label for="username">Имя пользователя:</label><br>
        <input type="text" id="username" name="username"><br><br>

        <label for="rating">Оценка (1-5):</label><br>
        <input type="number" id="rating" name="rating" min="1" max="5"><br><br>

        <label for="comments">Комментарии:</label><br>
        <textarea id="comments" name="comments" rows="4" cols="40"></textarea><br><br>

        <input type="submit" value="Submit Feedback">
      </form>
    </main>

    <footer>
      <p> <a href="index.html">вернуться к первой странице</a>.</p>
    </footer>
  </body>
</html>
